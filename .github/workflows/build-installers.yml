name: Build Installers

# Build the Windows .exe and macOS .dmg installers.
#   - Push a version tag (v1.0.0)  -> build AND publish to a GitHub Release, so
#     the in-app auto-updater (RONY-20, src/main/update) can serve the update.
#   - Manual run (workflow_dispatch) -> build only, uploaded as artifacts (no
#     Release is touched), for a quick test build.
#
# PUBLISH NOTE: electron-builder creates the Release as a DRAFT by default. The
# auto-updater ignores drafts, so after a tagged run you publish the draft from
# the GitHub Releases page to actually roll the update out. See docs/RELEASE.md.
#
# CODE SIGNING (scaffolded — activates automatically once you add the secrets):
#   The signing credentials below are read from repository secrets. While those
#   secrets are EMPTY, electron-builder simply produces UNSIGNED installers (a
#   warning, not a failure), so this workflow works today. The day you add the
#   certs as secrets (see docs/RELEASE.md), the same builds become signed — no
#   workflow change needed. macOS NOTARIZATION additionally needs a one-line flip
#   in electron-builder.yml (`notarize`), also documented in docs/RELEASE.md.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # contents: write lets electron-builder create/upload the GitHub Release on
    # tagged runs. Harmless on manual runs (we pass --publish never there).
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            script: build:win
            artifact: dist/*-setup.exe
            extra_args: ''
          - os: macos-latest
            name: macos
            script: build:mac
            artifact: dist/*.dmg
            extra_args: '--arch universal'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Full install (runs postinstall = electron-builder install-app-deps),
      # which rebuilds the native better-sqlite3 module for this OS.
      - name: Install dependencies
        run: npm ci

      # Publish only on a tag push; a manual run just builds (--publish never).
      #
      # Code signing is OPT-IN via secrets. We export CSC_LINK/CSC_KEY_PASSWORD
      # ONLY when a certificate is actually configured: an EMPTY CSC_LINK makes
      # electron-builder take the "sign with this cert file" path, resolve the
      # empty path to the project directory, and fail with "⨯ … not a file".
      # So a cert-less run must leave CSC_LINK UNSET and instead disable keychain
      # discovery, producing a clean UNSIGNED build. `shell: bash` so the one
      # script runs identically on the Windows and macOS runners.
      - name: Build installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH: ${{ github.ref_type == 'tag' && 'always' || 'never' }}
          # Google OAuth credentials — baked into the bundle via electron.vite.config.ts define.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # Per-OS certificates (base64 .p12/.pfx + password). May be empty.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Apple notarization (macOS only; used once electron-builder.yml
          # enables `notarize`). Empty == skipped.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ matrix.name }}" = "windows" ]; then
            CERT="$WIN_CSC_LINK"; CERT_PW="$WIN_CSC_KEY_PASSWORD"
          else
            CERT="$MAC_CSC_LINK"; CERT_PW="$MAC_CSC_KEY_PASSWORD"
          fi
          if [ -n "$CERT" ]; then
            export CSC_LINK="$CERT"
            export CSC_KEY_PASSWORD="$CERT_PW"
            echo "Code signing: enabled (certificate provided)"
          else
            # No cert: never set CSC_LINK (empty breaks electron-builder), and
            # stop the macOS keychain identity hunt so the build stays unsigned.
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "Code signing: disabled (no certificate secret) — unsigned build"
          fi
          npm run ${{ matrix.script }} -- --publish "$PUBLISH" ${{ matrix.extra_args }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: rony-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
