<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>Rony</title>
    <!--
      Content-Security-Policy (https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP).
      Enforced as a <meta> directive because it is cleanly scoped to THIS
      document — a session-wide onHeadersReceived header would also hit the
      offscreen PDF window (which loads a data: URL, see src/main/pdf/index.ts).
      'unsafe-inline' is required for style only (Vue binds inline styles, e.g.
      the scan progress bar); everything else is locked to 'self'. object/base/
      form are pinned shut since the app uses none of them.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
